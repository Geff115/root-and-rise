version: '3.9'

services:
  task_a:
    build:
      context: .
      dockerfile: task_a/Dockerfile
    container_name: root_rise_task_a
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  task_b:
    build:
      context: .
      dockerfile: task_b/Dockerfile
    container_name: root_rise_task_b
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped